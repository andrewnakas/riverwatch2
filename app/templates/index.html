<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RiverWatch2 — live zero-shot whitewater forecasts</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header class="topbar">
    <h1>RiverWatch2</h1>
    <p>Live 14-day zero-shot discharge forecasts for ~100 USGS gauges on popular USA whitewater rivers (free-flowing, no dam-release runs). Click a marker.</p>
    <div class="legend">
      <span class="dot dot-mt"></span> Mountain West
      <span class="dot dot-ak"></span> Alaska
      <span class="dot dot-other"></span> Other CONUS
    </div>
  </header>
  <div id="layout">
    <div id="map"></div>
    <aside id="panel">
      <div id="panel-empty">Select a station on the map to load its live forecast.</div>
      <div id="panel-content" style="display:none">
        <h2 id="station-title">—</h2>
        <div id="station-meta" class="meta"></div>
        <div id="forecast-status" class="status"></div>
        <div id="forecast-summary"></div>
        <canvas id="chart" width="640" height="320"></canvas>
        <div id="record-start"></div>
        <div id="snotel-block"></div>
        <div id="daily-stats"></div>
        <canvas id="climatology-chart" width="640" height="280" style="display:none"></canvas>
        <div id="member-table"></div>
        <button id="refresh-btn" type="button">Force refresh</button>
      </div>
    </aside>
  </div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
